name: Python checks

on: [push]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python sources
        run: |
          python -m py_compile $(git ls-files '*.py')
